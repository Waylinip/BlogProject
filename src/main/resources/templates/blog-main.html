<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blog</title>

    <!-- Только основной Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        /* Минимальные стили для центрирования контента как в шаблоне Cover */
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cover-container {
            max-width: 42em;
        }
        .nav-link {
            color: rgba(255, 255, 255, .5);
            margin-left: 1rem;
        }
        .nav-link:hover, .nav-link.active {
            color: #fff;
            border-bottom: 2px solid #fff;
        }
    </style>
</head>
<body class="text-center text-bg-dark">

<div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">

    <div th:replace="~{fragments/header :: site-header}">Тут будет шапка</div>
    <main class="px-3">
        <h1 th:text="${title}">Лента блогов</h1>

        <!-- Кнопка быстрой отправки нового поста -->
        <p class="text-end">
            <a href="/posts/add" class="btn btn-sm btn-outline-light">+ Создать пост</a>
        </p>

        <!-- Цикл для вывода постов из базы (переменная ${posts} из контроллера) -->
        <div th:each="post : ${posts}" class="card text-bg-dark border-light mb-3 text-start p-3">
            <h3 th:text="${post.title}">Заголовок поста</h3>
            <small class="text-white-50" th:text="'Автор: ' + ${post.author}"></small>
            <p class="mt-2" th:text="${post.content}">Текст поста...</p>
        </div>
    </main>

    <footer class="mt-auto text-white-50">
        <p>&copy; 2026 My Spring Blog</p>
    </footer>

</div>

<!-- JS для работы выпадающих списков или кнопок (если понадобятся) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
