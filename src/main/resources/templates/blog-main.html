<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Лента блогов</title>
    <link rel="stylesheet" th:href="@{/card-catalog.css}">
<!--    <link rel="stylesheet" href="card-catalog.css">-->
</head>
<body>

<header class="drawer-header">
    <div class="brass-label">
        <h1 class="site-title" th:text="${title}">Лента блогов</h1>
        <p class="site-subtitle">card catalog &middot; читальный зал</p>
    </div>
    <nav class="drawer-nav">
        <a href="/">Все карточки</a>
        <a href="/posts/add">+ Новая запись</a>
    </nav>
</header>

<nav class="guide-tabs" th:if="${categories}">
    <a class="guide-tab" th:each="cat : ${categories}"
       th:href="@{/posts/category/{c}(c=${cat.title})}" th:text="${cat.title}">CAT</a>
</nav>

<main class="catalog-container">

    <div th:if="${#lists.isEmpty(posts)}" class="empty-note">
        Картотека пуста — добавьте первую карточку.
    </div>

    <div class="card-grid" th:unless="${#lists.isEmpty(posts)}">
        <div class="index-card" th:each="post : ${posts}">
            <div class="punch-hole"></div>
            <div class="call-number"><span th:text="${post.category.title}">CAT</span></div>

            <h2 class="card-title" th:text="${post.title}">Заголовок</h2>
            <div class="card-meta">
                <span th:text="${post.author}">Автор</span> &middot;
                <span th:text="${#temporals.format(post.createdAt, 'dd.MM.yyyy')}">01.06.2026</span>
            </div>
            <p class="card-excerpt" th:text="${#strings.abbreviate(post.content, 140)}">Текст статьи…</p>

            <div class="stamp-grid">
                <span class="stamp" th:text="'👁 ' + ${post.views}">👁 0</span>
                <span class="stamp" th:text="'❤ ' + ${post.likes}">❤ 0</span>
            </div>

            <a class="btn-catalog brass" th:href="@{/posts/{id}(id=${post.id})}">Открыть карточку</a>
        </div>
    </div>

</main>

</body>
</html>
