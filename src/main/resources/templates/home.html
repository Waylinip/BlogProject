<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blog · Spring App</title>

    <!-- Только основной Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        /* Минимальные стили для центрирования контента как в шаблоне Cover */
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cover-container {
            max-width: 42em;
        }

        .nav-link {
            color: rgba(255, 255, 255, .5);
            margin-left: 1rem;
        }

        .nav-link:hover, .nav-link.active {
            color: #fff;
            border-bottom: 2px solid #fff;
        }
    </style>
</head>
<body class="text-center text-bg-dark">

<div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
    <div th:replace="~{fragments/header :: site-header}">Тут будет шапка</div>
<!--    <header class="mb-auto">-->

<!--        <div>-->
<!--            <h3 class="float-md-start mb-0">Blog</h3>-->
<!--            <nav class="nav nav-masthead justify-content-center float-md-end">-->
<!--                <a class="nav-link active" href="/">Home</a>-->
<!--                <a class="nav-link" href="/blog">To blog</a> &lt;!&ndash; Ведет на список постов &ndash;&gt;-->
<!--                <a class="nav-link" href="/about">About us</a>-->
<!--            </nav>-->
<!--        </div>-->
<!--    </header>-->
<!--    можно запихнуть header в отдельный класс чтобы (если нужно что-то изменить менять быстрее)-->
<!--    <div>-->
<!--        <header th:insert="blocks/header :: header"></header>-->
<!--    </div>-->

    <main class="px-3">
        <!-- Тот самый заголовок, который выводим из контроллера -->
        <h1 th:text="${title}">Заголовок по умолчанию</h1>

        <p class="lead">Это минималистичный шаблон для вашего приложения на Spring Boot.</p>
        <p class="lead">
            <!-- Главные кнопки выбора действий -->
            <a href="/blog" class="btn btn-lg btn-light fw-bold me-2">Читать блог</a>
            <a href="/posts/add" class="btn btn-lg btn-outline-light fw-bold">Написать пост</a>
            <a href="/about" class="btn btn-lg btn-light fw-bold">Узнать больше</a>
        </p>
    </main>
    <!-- Последние посты -->
    <div th:each="post : ${latestPosts}" class="card ...">
        <h4 th:text="${post.title}"></h4>
        <small th:text="${post.author}"></small>
        <p th:text="${post.content}"></p>
    </div>

    <!-- Авторы -->
    <div th:each="entry : ${authors}" class="author-card">
        <span th:text="${entry.key}"></span>
        <span th:text="${entry.value} + ' постов'"></span>
    </div>

    <footer th:replace="~{fragments/footer :: site-footer}"></footer>

</div>

<!-- JS для работы выпадающих списков или кнопок (если понадобятся) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
