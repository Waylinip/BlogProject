<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${post.title}">Пост</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body class="bg-dark text-light">

<div class="container py-5">

    <a href="/blog" class="btn btn-outline-light mb-4">
        ← Назад к списку
    </a>

    <div class="card bg-secondary text-light shadow">
        <div class="card-body">

            <h1 class="card-title mb-3"
                th:text="${post.title}">
                Заголовок
            </h1>

            <div class="mb-4 text-info">

                <span>
                    Автор:
                    <strong th:text="${post.author}">
                        Ivan
                    </strong>
                </span>

                <br>

                <span th:text="${#temporals.format(post.createdAt, 'dd.MM.yyyy HH:mm')}">
                    01.06.2026
                </span>

            </div>

            <hr>

            <div class="fs-5"
                 th:text="${post.content}">
                Текст статьи
            </div>

            <hr>

            <div class="d-flex gap-4">

                <span>
                    👁 Просмотры:
                    <strong th:text="${post.views}">
                        0
                    </strong>
                </span>

                <span>
                    ❤️ Лайки:
                    <strong th:text="${post.likes}">
                        0
                    </strong>
                </span>

            </div>

        </div>
    </div>

</div>

</body>
</html>
