<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${post.title}">Пост</title>
    <link rel="stylesheet" th:href="@{/card-catalog.css}">
</head>
<body>

<header class="drawer-header">
    <div class="brass-label">
        <h1 class="site-title">Карточка №<span th:text="${post.id}">1</span></h1>
        <p class="site-subtitle">учётная запись</p>
    </div>
    <nav class="drawer-nav">
        <a href="/">Все карточки</a>
        <a th:href="@{/posts/category/{c}(c=${post.category?.title})}">Раздел: <span th:text="${post.category?.title}">кат.</span></a>
    </nav>
</header>

<main class="catalog-container narrow">

    <a href="/" class="back-link">← Назад к списку</a>

    <article class="full-card">
        <div class="punch-hole"></div>
        <div class="call-number"><span th:text="${post.category?.title}">CAT</span></div>

        <h2 class="card-title" th:text="${post.title}">Заголовок</h2>
        <div class="card-meta">
            Автор: <strong th:text="${post.author}">Ivan</strong> &middot;
            <span th:text="${#temporals.format(post.createdAt, 'dd.MM.yyyy HH:mm')}">01.06.2026</span>
        </div>

        <hr class="divider-rule">

        <div class="card-body-text" th:text="${post.content}">Текст статьи</div>

        <hr class="divider-rule">

        <div class="stamp-grid">
            <span class="stamp" th:text="'👁 просмотры: ' + ${post.views}">👁 просмотры: 0</span>
            <span class="stamp" th:text="'❤ лайки: ' + ${post.likes}">❤ лайки: 0</span>
        </div>

        <a class="btn-catalog stamp-btn" th:href="@{/posts/{id}/edit(id=${post.id})}">Редактировать карточку</a>
    </article>

</main>

</body>
</html>
