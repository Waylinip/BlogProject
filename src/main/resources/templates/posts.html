<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Посты</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 2rem;
        }
        .cover-container {
            max-width: 42em;
            width: 100%;
        }
        .nav-link {
            color: rgba(255, 255, 255, .5);
            margin-left: 1rem;
        }
        .nav-link:hover, .nav-link.active {
            color: #fff;
            border-bottom: 2px solid #fff;
        }
    </style>
</head>
<body class="text-bg-dark">

<div class="cover-container d-flex p-3 mx-auto flex-column">

    <div th:replace="~{fragments/header :: site-header}">Тут будет шапка</div>

    <main class="px-3" style="clear: both; padding-top: 1rem;">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 th:text="${title}">Лента блогов</h1>
            <a href="/posts/add" class="btn btn-sm btn-outline-light">+ Создать пост</a>
        </div>

        <!-- Если постов нет -->
        <p th:if="${#lists.isEmpty(posts)}" class="text-white-50 text-center mt-5">
            Постов пока нет. Будьте первым!
        </p>

        <!-- Список постов -->
        <div th:each="post : ${posts}"
             class="card text-bg-dark border-light mb-3 text-start p-3">
            <h3 th:text="${post.title}">Заголовок поста</h3>
            <small class="text-white-50" th:text="'Автор: ' + ${post.author}"></small>
            <p class="mt-2" th:text="${post.content}">Текст поста...</p>
        </div>

    </main>

    <footer class="mt-auto text-white-50 text-center py-3">
        <p>&copy; 2026 My Spring Blog</p>
    </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
