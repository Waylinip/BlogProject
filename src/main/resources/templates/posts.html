<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Раздел картотеки</title>
    <link rel="stylesheet" th:href="@{/card-catalog.css}">
</head>
<body>

<header class="drawer-header">
    <div class="brass-label">
        <h1 class="site-title">Раздел картотеки</h1>
        <p class="site-subtitle">выборка по разделу</p>
    </div>
    <nav class="drawer-nav">
        <a href="/">Все карточки</a>
        <a href="/posts/add">+ Новая запись</a>
    </nav>
</header>

<main class="catalog-container">

    <a href="/" class="back-link">← Назад ко всей картотеке</a>

    <div th:if="${#lists.isEmpty(posts)}" class="empty-note">
        В этом разделе картотеки пока нет карточек.
    </div>

    <div class="card-grid" th:unless="${#lists.isEmpty(posts)}">
        <div class="index-card" th:each="post : ${posts}">
            <div class="punch-hole"></div>
            <div class="call-number"><span th:text="${post.category}">CAT</span></div>

            <h2 class="card-title" th:text="${post.title}">Заголовок</h2>
            <div class="card-meta">
                <span th:text="${post.author}">Автор</span> &middot;
                <span th:text="${#temporals.format(post.createdAt, 'dd.MM.yyyy HH:mm')}">01.06.2026</span>
            </div>
            <p class="card-excerpt" th:text="${#strings.abbreviate(post.content, 150)}">Текст статьи…</p>

            <div class="stamp-grid">
                <span class="stamp" th:text="'👁 ' + ${post.views}">👁 0</span>
                <span class="stamp" th:text="'❤ ' + ${post.likes}">❤ 0</span>
            </div>

            <a class="btn-catalog brass" th:href="@{/posts/{id}(id=${post.id})}">Читать карточку</a>
        </div>
    </div>

</main>

</body>
</html>
