<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новая карточка</title>
    <link rel="stylesheet" th:href="@{/card-catalog.css}">
</head>
<body>

<header class="drawer-header">
    <div class="brass-label">
        <h1 class="site-title">Новая карточка</h1>
        <p class="site-subtitle">бланк заявки на внесение</p>
    </div>
    <nav class="drawer-nav">
        <a href="/">Все карточки</a>
    </nav>
</header>

<main class="catalog-container narrow">

    <a href="/" class="back-link">← Назад к списку</a>

    <form class="form-card" th:action="@{/posts/add}" th:object="${post}" method="post">
        <div class="punch-hole"></div>
        <div class="call-number"><span>NEW</span></div>

        <div class="form-group">
            <label for="title">Заголовок</label>
            <input type="text" id="title" th:field="*{title}" required>
        </div>

        <div class="form-group">
            <label for="author">Автор</label>
            <input type="text" id="author" th:field="*{author}" required>
        </div>

        <div class="form-group">
            <label for="category">Категория</label>

            <select id="category" th:field="*{category}" required>
                <option value="">Выберите категорию</option>
                <option th:each="cat : ${T(org.example.blog1.models.Category).values()}"
                        th:value="${cat}"
                        th:text="${cat}">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label for="content">Текст статьи</label>
            <textarea id="content" th:field="*{content}" required></textarea>
        </div>

        <button type="submit" class="btn-catalog brass">Внести в картотеку</button>

    </form>

</main>

</body>
</html>
