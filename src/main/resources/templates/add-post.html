<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add New Post</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { height: 100vh; display: flex; align-items: center; }
        .form-container { max-width: 32em; width: 100%; }
    </style>
</head>
<body class="text-bg-dark">

<div class="form-container mx-auto p-4">
    <h2 class="mb-4 text-center">Create New Post</h2>

    <!-- th:action указывает куда слать данные, th:object связывает поля с классом Post -->
    <form th:action="@{/posts/add}" th:object="${post}" method="post">

        <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input type="text" th:field="*{title}" class="form-control" id="title" required>
        </div>

        <div class="mb-3">
            <label for="author" class="form-label">Author</label>
            <input type="text" th:field="*{author}" class="form-control" id="author" required>
        </div>

        <div class="mb-3">
            <label for="content" class="form-label">Content</label>
            <textarea th:field="*{content}" class="form-control" id="content" rows="5" required></textarea>
        </div>

        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-light fw-bold">Publish Post</button>
            <!-- Кнопка "Отмена" возвращает назад в ленту блогов -->
            <a href="/posts" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
